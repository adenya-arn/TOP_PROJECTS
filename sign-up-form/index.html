<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logoSide">
        <div class="logo">
          <img src="odin-lined.png" alt="Logoof the odin project" />
          <h1>ODIN</h1>
        </div>

        <footer>
          Photo by
          <a
            href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Halie West</a
          >
          on
          <a
            href="https://unsplash.com/photos/brown-and-gray-mountain-beside-blue-sea-during-daytime-F2927oeFqVs?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Unsplash</a
          >
        </footer>
      </div>

      <div class="rightSide">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up now
          to get started.
        </p>
        <p>You know you want to.!!</p>
        <form action="submit" method="post">
          <legend>Let's do this!</legend>

          <div class="form-row">
            <div class="input-group">
              <label for="firstName">FIRST NAME</label>
              <input type="text" name="firstName" id="firstName" />
            </div>

            <div class="input-group">
              <label for="lastName">LAST NAME</label>
              <input type="text" name="lastName" id="lastName" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="email">EMAIL</label>
              <input type="email" name="email" id="email" />
            </div>

            <div class="input-group">
              <label for="phoneNumber">PHONE NUMBER</label>
              <input
                type="number"
                name="phoneNumber"
                id="phoneNumber"
                placeholder="0712345678.."
              />
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="password">PASSWORD</label>
              <input type="password" name="password" id="password" />
            </div>

            <div class="input-group">
              <label for="password">CONFIRM PASSWORD</label>
              <input type="password" name="password" id="confirmPassword" />
            </div>
          </div>

          <button type="submit">Create Account</button>
        </form>

        <p>Already have an account? <a href="http://login">Login In</a></p>
      </div>
    </div>
  </body>
</html>
